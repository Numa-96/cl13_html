<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>花畑の朝</title>

<style>
*{margin:0;box-sizing:border-box}

body{
  overflow:hidden;
  font-family:sans-serif;
}

main{
  width:100vw;
  height:100vh;
  position:relative;
  background:url("bg0.png") center/cover no-repeat;
}

.message{
  position:absolute;
  top:8%;
  left:2%;
  padding:18px;
  background:#fff9;
  color:#21cfb2;
  font-size:clamp(22px,2.2vw,38px);
  font-weight:bold;
  line-height:1.5;
}

.butterfly{
  position:absolute;
  width:9vw;
  max-width:145px;
  min-width:70px;
}

.b1{left:39%;top:66%;transform:rotate(-8deg)}
.b2{left:15%;top:75%;transform:rotate(8deg)}
.b3{left:62%;top:81%;transform:rotate(-10deg)}

.credit{
  position:absolute;
  right:4%;
  bottom:2%;
  color:white;
  font-weight:bold;
  text-shadow:1px 1px 2px #000;
}
</style>
</head>

<body>
<main>
  <div class="message">
    ぽかぽか陽気の穏やかな朝<br>
    花畑では、蝶々がのんびり飛んでいます
  </div>

  <img src="butterfly.gif" class="butterfly b1">
  <img src="butterfly.gif" class="butterfly b2">
  <img src="butterfly.gif" class="butterfly b3">

</main>
</body>
</html>
